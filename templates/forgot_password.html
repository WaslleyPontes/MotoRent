{% extends 'base.html' %}

{% block content %}
<section class="auth-card">
    <h2>Recuperar senha</h2>
    <p class="small-text">Informe o e-mail cadastrado para receber instruções de recuperação.</p>
    <form method="post" action="{{ url_for('forgot_password') }}">
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email" required />
        </div>
        <button type="submit" class="button">Enviar instruções</button>
    </form>
    {% if reset_link and not email_sent %}
        <div class="alert-banner" style="margin-top: 16px; word-break: break-word;">
            <strong>Link de recuperação:</strong>
            <a href="{{ reset_link }}">{{ reset_link }}</a>
        </div>
    {% endif %}
    <p class="small-text">Lembrou a senha? <a href="{{ url_for('login') }}">Voltar ao login</a></p>
</section>
{% endblock %}
