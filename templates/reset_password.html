{% extends 'base.html' %}

{% block content %}
<section class="auth-card">
    <h2>Redefinir senha</h2>
    <p class="small-text">Digite a nova senha para sua conta.</p>
    <form method="post" action="{{ url_for('reset_password', token=request.view_args.token) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <div class="form-group">
            <label for="password">Nova senha</label>
            <input type="password" name="password" id="password" required />
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirmar nova senha</label>
            <input type="password" name="confirm_password" id="confirm_password" required />
        </div>
        <button type="submit" class="button">Redefinir senha</button>
    </form>
    <p class="small-text">Se lembrar da senha, <a href="{{ url_for('login') }}">volte ao login</a>.</p>
</section>
{% endblock %}
