{% extends 'base.html' %}

{% block content %}
<section class="auth-card">
    <div class="login-brand">
        <img src="/static/icons/icon-192.png" alt="MotoRent" />
        <div>
            <h1>MotoRent</h1>
            <p class="small-text">Faça login para acessar o painel de controle</p>
        </div>
    </div>
    <h2>Entrar</h2>
    <form method="post" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">Usuário</label>
            <input type="text" name="username" id="username" required />
        </div>
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" name="password" id="password" required />
        </div>
        <button type="submit" class="button">Entrar</button>
    </form>
    <p class="small-text"><a href="{{ url_for('forgot_password') }}">Esqueceu sua senha?</a></p>
    <p class="small-text">Novo por aqui? <a href="{{ url_for('register') }}">Crie uma conta</a></p>
</section>
{% endblock %}
