{% extends 'base.html' %}

{% block content %}
<div class="content-grid">
    <section class="form-card">
        <h2>Upload de documento</h2>
        <form method="post" action="{{ url_for('upload_document') }}" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
            <div class="form-group">
                <label for="owner_type">Tipo de proprietário</label>
                <select name="owner_type" id="owner_type" required>
                    <option value="customer">Cliente</option>
                    <option value="vehicle">Veículo</option>
                </select>
            </div>
            <div class="form-group">
                <label for="owner_id">Proprietário</label>
                <select name="owner_id" id="owner_id" required>
                    <option value="">Selecione</option>
                    <optgroup label="Clientes">
                        {% for customer in customers %}
                            <option value="customer:{{ customer.id }}">{{ customer.name }}</option>
                        {% endfor %}
                    </optgroup>
                    <optgroup label="Veículos">
                        {% for vehicle in vehicles %}
                            <option value="vehicle:{{ vehicle.id }}">{{ vehicle.model }} ({{ vehicle.plate }})</option>
                        {% endfor %}
                    </optgroup>
                </select>
            </div>
            <div class="form-group">
                <label for="doc_type">Tipo de documento</label>
                <select name="doc_type" id="doc_type" required>
                    <option value="CRLV">CRLV</option>
                    <option value="CNH">CNH</option>
                    <option value="CPF">CPF</option>
                    <option value="RG">RG</option>
                </select>
            </div>
            <div class="form-group">
                <label for="background_check">Consulta de antecedentes criminais</label>
                <select name="background_check" id="background_check" required>
                    <option value="Não">Não</option>
                    <option value="Sim">Sim</option>
                </select>
            </div>
            <div class="form-group">
                <label for="file">Arquivo</label>
                <input type="file" name="file" id="file" accept="image/*,.pdf" required />
            </div>
            <button type="submit" class="button">Enviar documento</button>
        </form>
    </section>

    <section class="table-card">
        <div class="section-header"><h2>Resultado de OCR</h2></div>
        {% if ocr_result %}
            <div class="ocr-result">
                <p><strong>Texto extraído:</strong></p>
                <pre>{{ ocr_result.text }}</pre>
            </div>
        {% else %}
            <p>Faça upload de um documento para testar o OCR e salvar a informação no sistema.</p>
        {% endif %}
    </section>
</div>
{% endblock %}
